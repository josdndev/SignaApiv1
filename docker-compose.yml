version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.simple
    container_name: signaapi
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SAAS_DATABASE_URL=${SAAS_DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - SAAS_SECRET_KEY=${SAAS_SECRET_KEY}
      - PYTHONPATH=/app
    volumes:
      - .:/app
    restart: unless-stopped
